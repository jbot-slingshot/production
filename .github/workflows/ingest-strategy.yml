- name: Download latest zip from Drive folder
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          python <<'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload

          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ['GDRIVE_SA_KEY']),
              scopes=['https://www.googleapis.com/auth/drive.readonly']
          )
          service = build('drive', 'v3', credentials=creds)

          folder_id = os.environ['DRIVE_FOLDER_ID']

          # Find the most recent .zip in the folder
          results = service.files().list(
              q=f"'{folder_id}' in parents and mimeType='application/zip' and trashed=false",
              orderBy='modifiedTime desc',
              pageSize=1,
              fields='files(id, name, modifiedTime)'
          ).execute()

          files = results.get('files', [])
          if not files:
              raise SystemExit('No zip files found in the shared folder')

          target = files[0]
          print(f"Downloading {target['name']} (modified {target['modifiedTime']})")

          request = service.files().get_media(fileId=target['id'])
          with open('slingshotNQ.zip', 'wb') as f:
              downloader = MediaIoBaseDownload(f, request)
              done = False
              while not done:
                  _, done = downloader.next_chunk()
          EOF
